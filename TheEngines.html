<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Engines</title>
  <style>
    :root {
      --bg:#0f1115;
      --panel:#161a22;
      --panel2:#10131a;
      --text:#e7eaf0;
      --muted:#aab3c5;
      --border:rgba(255,255,255,0.10);

      --green:#23d18b;
      --yellow:#ffd400;
      --red:#ff4d4d;
    }

    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(1200px 700px at 30% 10%,#1a2140 0%,var(--bg) 55%);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}

    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .game-title{font-size:18px;font-weight:800;letter-spacing:0.2px}
    .top-actions{display:flex;align-items:center;gap:8px}

    header.stats{display:flex;gap:12px;flex-wrap:wrap}
    .stat{flex:1 1 260px;background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);border:1px solid var(--border);border-radius:14px;padding:14px 16px;min-height:72px;position:relative;overflow:hidden}
    .label{font-size:12px;color:var(--muted);text-transform:uppercase}
    .value{font-size:26px;font-weight:700;margin-top:6px}
    .power-final{color:var(--green);}

    .time-finished{position:absolute;right:16px;top:14px;font-size:12px;font-weight:900;color:var(--green)}

    .tree-wrap{position:relative;margin-top:16px}
    .tree-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
    .grid{display:grid;grid-template-columns:repeat(5,minmax(160px,1fr));column-gap:12px;row-gap:26px;position:relative;z-index:1}
    @media (max-width:1000px){.grid{grid-template-columns:repeat(2,minmax(160px,1fr));}}
    @media (max-width:520px){.grid{grid-template-columns:1fr;}}

    .engine{background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:140px}

    .engine.hl-green{border-color:var(--green);box-shadow:0 0 0 2px rgba(35,209,139,0.25),0 0 18px rgba(35,209,139,0.14)}
    .engine.hl-yellow{border-color:var(--yellow);box-shadow:0 0 0 2px rgba(255,212,0,0.22),0 0 18px rgba(255,212,0,0.12)}
    .engine.hl-red{border-color:var(--red);box-shadow:0 0 0 2px rgba(255,77,77,0.22),0 0 18px rgba(255,77,77,0.12)}

    .tree-line{transition:stroke 120ms ease,stroke-width 120ms ease,opacity 120ms ease;opacity:0.85}
    .tree-line.hl-green{stroke:var(--green) !important;stroke-width:3 !important;opacity:0.98}
    .tree-line.hl-yellow{stroke:var(--yellow) !important;stroke-width:3 !important;opacity:0.98}
    .tree-line.hl-red{stroke:var(--red) !important;stroke-width:3 !important;opacity:0.98}

    .engine h3{margin:0;font-size:13px;color:var(--muted);font-weight:600;white-space:nowrap}
    .level-row{font-size:14px;font-weight:800;color:var(--text)}

    button{cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);border-radius:12px;padding:10px 12px;font-weight:700;transition:transform 80ms ease,background 120ms ease,opacity 120ms ease,border-color 120ms ease;user-select:none}
    button:active{transform:translateY(1px) scale(0.99)}
    button:hover{background:rgba(255,255,255,0.06)}
    button:disabled{cursor:not-allowed;opacity:.65}

    .primary{background:rgba(122,162,255,0.12);border-color:rgba(122,162,255,0.35)}
    .display-only{background:rgba(255,255,255,0.10);border:none;border-radius:0;color:rgba(231,234,240,0.85);cursor:default}
    .display-only:hover{background:rgba(255,255,255,0.10)}
    .display-only:active{transform:none}
    .producing{background:#000 !important}
    .producing:hover{background:#000 !important}
    .primary:hover{background:rgba(122,162,255,0.16)}

    .sub{font-size:12px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-label{font-weight:800}
    .cost{font-weight:700;color:rgba(231,234,240,0.72);font-size:12px}

    .state-green{border-color:rgba(35,209,139,0.65);background:rgba(35,209,139,0.10)}
    .state-yellow{border-color:rgba(255,212,0,0.60);background:rgba(255,212,0,0.08)}
    .state-red{border-color:rgba(255,77,77,0.60);background:rgba(255,77,77,0.08)}

    .start{background:rgba(35,209,139,0.85);border-color:rgba(35,209,139,1);color:#0b1a12;font-weight:800}
    .start:hover{background:rgba(35,209,139,1)}
    .start.running{background:rgba(35,209,139,0.35);border-color:rgba(35,209,139,0.6);color:var(--text)}
    .start:hover{background:rgba(35,209,139,0.14)}
    .settings-btn{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.25)}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.58);display:none;align-items:center;justify-content:center;padding:20px;z-index:40}
    .overlay.open{display:flex}
    .settings-panel{width:min(460px,100%);background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px}
    .settings-title{font-size:18px;font-weight:800}
    .settings-grid{display:grid;grid-template-columns:1fr;gap:10px}
    .settings-field{display:flex;flex-direction:column;gap:6px}
    .settings-field label{font-size:12px;color:var(--muted)}
    .settings-field input{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px}
    .settings-actions{display:flex;gap:8px;flex-wrap:wrap}
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="game-title">The Engines</div>
    <div class="top-actions">
      <button class="settings-btn" id="settingsBtn">Settings</button>
      <button class="start" id="startBtn">Start</button>
    </div>
  </div>

  <header class="stats">
    <div class="stat" id="powerStat">
      <div class="label">Current power</div>
      <div class="value" id="powerValue">0</div>
    </div>
    <div class="stat">
      <div class="label">Power gain / second</div>
      <div class="value" id="ppsValue">0</div>
    </div>
    <div class="stat" id="timeStat">
      <div class="label">Time left</div>
      <div class="value" id="timeValue">5 min 0.0 s</div>
      <div class="time-finished" id="finishedBadge" style="display:none;">Time up!</div>
    </div>
  </header>

  <div class="tree-wrap" id="treeWrap">
    <svg class="tree-lines" id="treeLines" aria-hidden="true"></svg>
    <section class="grid" id="engineGrid"></section>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-title" id="settingsTitle">Game Settings</div>
      <div class="settings-grid">
        <div class="settings-field">
          <label for="rowsInput">Rows</label>
          <input id="rowsInput" type="number" min="1" max="8" step="1" />
        </div>
        <div class="settings-field">
          <label for="enginesInput">Engines per row</label>
          <input id="enginesInput" type="number" min="1" max="10" step="1" />
        </div>
        <div class="settings-field">
          <label for="timerInput">Timer (minutes)</label>
          <input id="timerInput" type="number" min="1" max="60" step="1" />
        </div>
      </div>
      <div class="settings-actions">
        <button class="start" id="saveSettingsBtn">Save changes</button>
        <button id="resetSettingsBtn">Reset defaults</button>
        <button id="closeSettingsBtn">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_SETTINGS = { rows: 3, enginesPerRow: 5, timerMinutes: 5 };
let settings = { ...DEFAULT_SETTINGS };

let power = 0;
let gameStarted = false;
let running = false;
let finished = false;
let startTs = null;
let finishedElapsedMs = 0;

let rows = [];
let engines = [];
let engineEls = [];

const CLICK_GAIN_BASE = 1;
const AUTOMATE_COST_BASE = 20;

const parentsById = {};
const childrenById = {};
let highlightedIds = new Set();
let highlightedColor = null;
let allLineEls = [];
let edges = [];
let lineByKey = new Map();
let updateLinesQueued = false;

const startBtn = document.getElementById("startBtn");
const settingsBtn = document.getElementById("settingsBtn");
const settingsOverlay = document.getElementById("settingsOverlay");
const rowsInput = document.getElementById("rowsInput");
const enginesInput = document.getElementById("enginesInput");
const timerInput = document.getElementById("timerInput");
const saveSettingsBtn = document.getElementById("saveSettingsBtn");
const resetSettingsBtn = document.getElementById("resetSettingsBtn");
const closeSettingsBtn = document.getElementById("closeSettingsBtn");

const powerValueEl = document.getElementById("powerValue");
const ppsValueEl = document.getElementById("ppsValue");
const timeValueEl = document.getElementById("timeValue");
const finishedBadgeEl = document.getElementById("finishedBadge");

const gridEl = document.getElementById("engineGrid");
const treeWrapEl = document.getElementById("treeWrap");
const treeSvgEl = document.getElementById("treeLines");

function formatInt(n){ return Math.floor(n).toString(); }
function gain(a){ power += a; }
function spend(c){ power = Math.max(0, power - c); }
function canAfford(c){ return power >= c; }
function canManualClick(e){ return e.rowIndex === 0; }
function gameDurationMs(){ return settings.timerMinutes * 60 * 1000; }
function rowScale(rowIndex){ return Math.pow(10, rowIndex); }

function generateRows(count){
  return Array.from({ length: count }, (_, i) => ({
    label: `Row ${i + 1}`,
  }));
}

function buildEngineModel(){
  rows = generateRows(settings.rows);
  engines = rows.flatMap((row, rowIndex) =>
    Array.from({ length: settings.enginesPerRow }, (_, colIndex) => ({
      id: rowIndex * settings.enginesPerRow + colIndex,
      rowIndex,
      colIndex,
      automated: false,
      rate: 0,
      upgradesBought: 0,
      level: 1,
    }))
  );
  engineEls = engines.map(() => ({ levelEl:null, mainBtn:null, actionBtn:null, labelEl:null, costEl:null, titleEl:null, cardEl:null }));
}

function clickGainFor(e){ return canManualClick(e) ? CLICK_GAIN_BASE : 0; }
function automateCostFor(e){ return AUTOMATE_COST_BASE * rowScale(e.rowIndex); }
function upgradeCostFor(e){ return automateCostFor(e) + (e.upgradesBought + 1) * (10 * rowScale(e.rowIndex)); }
function baseRateFor(e){ return rowScale(e.rowIndex); }
function initialRateFor(e){ return baseRateFor(e); }
function upgradeDeltaFor(e){ return baseRateFor(e); }
function totalPPS(){ return engines.reduce((s, e) => s + (e.automated ? e.rate : 0), 0); }

function getParents(e){ return (parentsById[e.id] || []).map(pid => engines[pid]); }
function minParentLevel(e){ const p = getParents(e); return p.length ? Math.min(...p.map(x => x.level)) : Infinity; }
function parentsAllowNextLevel(e){ const p = getParents(e); if(!p.length) return true; return minParentLevel(e) >= e.level + 1; }

function actionStatus(e){
  const cost = e.automated ? upgradeCostFor(e) : automateCostFor(e);
  const condPower = canAfford(cost);
  const condParents = parentsAllowNextLevel(e);
  if(condPower && condParents) return "green";
  if(condPower || condParents) return "yellow";
  return "red";
}

function canPerformAction(e){ return gameStarted && running && !finished && actionStatus(e) === "green"; }

function randInt(maxExclusive){ return Math.floor(Math.random() * maxExclusive); }
function pickTwoDistinct(indices){
  if(indices.length < 2) return indices.slice();
  const a = indices[randInt(indices.length)];
  let b = indices[randInt(indices.length)];
  while(b === a) b = indices[randInt(indices.length)];
  return [a, b];
}

function initConnections(){
  for(const k of Object.keys(parentsById)) delete parentsById[k];
  for(const k of Object.keys(childrenById)) delete childrenById[k];
  for(let rowIndex = 1; rowIndex < settings.rows; rowIndex++){
    const parentIds = engines.filter(e => e.rowIndex === rowIndex - 1).map(e => e.id);
    const children = engines.filter(e => e.rowIndex === rowIndex);
    children.forEach(child => { parentsById[child.id] = pickTwoDistinct(parentIds); });
  }
  Object.keys(parentsById).forEach(cid => {
    parentsById[cid].forEach(pid => {
      if(!childrenById[pid]) childrenById[pid] = [];
      childrenById[pid].push(Number(cid));
    });
  });
}

function ancestorsOf(id){
  const s = new Set();
  const stack = [id];
  while(stack.length){
    const c = stack.pop();
    (parentsById[c] || []).forEach(p => {
      if(!s.has(p)){ s.add(p); stack.push(p); }
    });
  }
  return s;
}

function descendantsOf(id){
  const s = new Set();
  const stack = [id];
  while(stack.length){
    const c = stack.pop();
    (childrenById[c] || []).forEach(ch => {
      if(!s.has(ch)){ s.add(ch); stack.push(ch); }
    });
  }
  return s;
}

function highlightSetFor(id){
  const set = new Set([id]);
  ancestorsOf(id).forEach(x => set.add(x));
  descendantsOf(id).forEach(x => set.add(x));
  return set;
}

function clearHighlight(){
  highlightedIds.forEach(id => engineEls[id]?.cardEl.classList.remove("hl-green","hl-yellow","hl-red"));
  allLineEls.forEach(l => l.classList.remove("hl-green","hl-yellow","hl-red"));
  highlightedIds = new Set();
  highlightedColor = null;
}

function applyHighlight(id){
  const set = highlightSetFor(id);
  const color = actionStatus(engines[id]);
  engines.forEach(e => {
    const card = engineEls[e.id].cardEl;
    card.classList.remove("hl-green","hl-yellow","hl-red");
    if(set.has(e.id)) card.classList.add(`hl-${color}`);
  });
  allLineEls.forEach(l => {
    l.classList.remove("hl-green","hl-yellow","hl-red");
    const p = Number(l.dataset.parentId);
    const c = Number(l.dataset.childId);
    if(set.has(p) && set.has(c)) l.classList.add(`hl-${color}`);
  });
  highlightedIds = set;
  highlightedColor = color;
}

function applyGridColumns(){
  gridEl.style.gridTemplateColumns = `repeat(${settings.enginesPerRow}, minmax(160px,1fr))`;
}

function buildUI(){
  applyGridColumns();
  gridEl.innerHTML = "";
  engines.forEach(engine => {
    const card = document.createElement("div");
    card.className = "engine";
    card.addEventListener("pointerenter", () => applyHighlight(engine.id));
    card.addEventListener("pointerleave", clearHighlight);

    const title = document.createElement("h3");
    const levelRow = document.createElement("div");
    levelRow.className = "level-row";

    const mainBtn = document.createElement("button");
    mainBtn.className = "primary";
    mainBtn.addEventListener("pointerdown", ev => {
      ev.preventDefault();
      if(!gameStarted || !running || finished || !canManualClick(engine)) return;
      const g = clickGainFor(engine);
      if(g > 0) gain(g);
      checkTimeUp();
      fastHUD();
    });

    const actionBtn = document.createElement("button");
    actionBtn.className = "sub";
    const labelEl = document.createElement("span");
    labelEl.className = "btn-label";
    const costEl = document.createElement("span");
    costEl.className = "cost";
    actionBtn.appendChild(labelEl);
    actionBtn.appendChild(costEl);
    actionBtn.addEventListener("pointerdown", ev => {
      ev.preventDefault();
      if(!canPerformAction(engine)) return;
      if(!engine.automated){
        spend(automateCostFor(engine));
        engine.automated = true;
        engine.rate = initialRateFor(engine);
        engine.level++;
      } else {
        spend(upgradeCostFor(engine));
        engine.upgradesBought++;
        engine.rate += upgradeDeltaFor(engine);
        engine.level++;
      }
      checkTimeUp();
      refreshUI();
      scheduleUpdateLinePositions();
      if(highlightedIds.has(engine.id)) applyHighlight(engine.id);
    });

    card.appendChild(title);
    card.appendChild(levelRow);
    card.appendChild(mainBtn);
    card.appendChild(actionBtn);
    gridEl.appendChild(card);

    engineEls[engine.id] = { levelEl: levelRow, mainBtn, actionBtn, labelEl, costEl, titleEl: title, cardEl: card };
  });
}

function rebuildLines(){
  treeSvgEl.innerHTML = "";
  lineByKey = new Map();
  allLineEls = [];
  edges = [];
  engines.forEach(child => {
    (parentsById[child.id] || []).forEach(pid => edges.push({ p: pid, c: child.id }));
  });
  edges.forEach(({ p, c }) => {
    const key = `${p}->${c}`;
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.classList.add("tree-line");
    line.dataset.parentId = String(p);
    line.dataset.childId = String(c);
    line.setAttribute("stroke", "rgba(122,162,255,0.45)");
    line.setAttribute("stroke-width", "2");
    line.setAttribute("stroke-linecap", "round");
    treeSvgEl.appendChild(line);
    lineByKey.set(key, line);
  });
  allLineEls = Array.from(lineByKey.values());
}

function updateLinePositions(){
  const wrapRect = treeWrapEl.getBoundingClientRect();
  treeSvgEl.setAttribute("viewBox", `0 0 ${wrapRect.width} ${wrapRect.height}`);
  edges.forEach(({ p, c }) => {
    const pRect = engineEls[p].cardEl.getBoundingClientRect();
    const cRect = engineEls[c].cardEl.getBoundingClientRect();
    const line = lineByKey.get(`${p}->${c}`);
    if(!line) return;
    line.setAttribute("x1", (pRect.left - wrapRect.left) + pRect.width / 2);
    line.setAttribute("y1", (pRect.top - wrapRect.top) + pRect.height);
    line.setAttribute("x2", (cRect.left - wrapRect.left) + cRect.width / 2);
    line.setAttribute("y2", (cRect.top - wrapRect.top));
  });
}

function scheduleUpdateLinePositions(){
  if(updateLinesQueued) return;
  updateLinesQueued = true;
  requestAnimationFrame(() => {
    updateLinesQueued = false;
    updateLinePositions();
  });
}

function formatRemaining(ms){
  const totalSeconds = ms / 1000;
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds - minutes * 60;
  const secInt = Math.floor(seconds);
  const tenths = Math.floor((seconds - secInt) * 10);
  return `${minutes} min ${secInt}.${tenths} s`;
}

function getElapsedMs(nowTs){
  if(!gameStarted) return 0;
  if(finished) return finishedElapsedMs;
  if(startTs == null) return 0;
  return Math.max(0, nowTs - startTs);
}

function getRemainingMs(nowTs){
  return Math.max(0, gameDurationMs() - getElapsedMs(nowTs));
}

function fastHUD(){
  powerValueEl.textContent = formatInt(power);
  ppsValueEl.textContent = gameStarted ? formatInt(totalPPS()) : "0";
}

function refreshUI(nowTs = performance.now()){
  powerValueEl.textContent = formatInt(power);
  ppsValueEl.textContent = gameStarted ? formatInt(totalPPS()) : "0";
  timeValueEl.textContent = formatRemaining(getRemainingMs(nowTs));
  powerValueEl.classList.toggle("power-final", finished);
  finishedBadgeEl.style.display = finished ? "block" : "none";
  settingsBtn.disabled = running;

  engines.forEach(engine => {
    const els = engineEls[engine.id];
    els.titleEl.textContent = `${rows[engine.rowIndex].label} - ⚙️ Engine ${engine.colIndex + 1}`;
    els.levelEl.textContent = `Level ${engine.level}`;
    els.mainBtn.classList.remove("display-only","producing");

    if(engine.rowIndex > 0){
      els.mainBtn.classList.add("display-only");
      els.mainBtn.textContent = engine.automated ? `${engine.rate}/s` : "Waiting";
      if(engine.automated) els.mainBtn.classList.add("producing");
    } else if(engine.automated){
      els.mainBtn.textContent = `Click + ${engine.rate}/s`;
      els.mainBtn.classList.add("producing");
    } else if(!gameStarted){
      els.mainBtn.textContent = "Waiting";
    } else {
      els.mainBtn.textContent = "Click";
    }
    els.mainBtn.disabled = !gameStarted || !running || finished || !canManualClick(engine);

    const cost = engine.automated ? upgradeCostFor(engine) : automateCostFor(engine);
    els.labelEl.textContent = engine.automated ? "Upgrade" : "Automate";
    els.costEl.textContent = `Cost: ${cost}`;

    els.actionBtn.classList.remove("state-green","state-yellow","state-red");
    const st = actionStatus(engine);
    els.actionBtn.classList.add(`state-${st}`);
    els.actionBtn.disabled = !gameStarted || !running || finished || st !== "green";
  });

  if(!gameStarted){
    startBtn.textContent = "Start";
    startBtn.classList.remove("running");
  } else if(finished){
    startBtn.textContent = "Start again";
    startBtn.classList.remove("running");
  } else {
    startBtn.textContent = "Running";
    startBtn.classList.add("running");
  }
}

function checkTimeUp(nowTs = performance.now()){
  if(finished) return;
  if(getElapsedMs(nowTs) >= gameDurationMs()){
    finishedElapsedMs = gameDurationMs();
    finished = true;
    running = false;
    refreshUI(nowTs);
  }
}

function resetGame(){
  power = 0;
  gameStarted = false;
  running = false;
  finished = false;
  startTs = null;
  finishedElapsedMs = 0;
  engines.forEach(e => {
    e.automated = false;
    e.rate = 0;
    e.upgradesBought = 0;
    e.level = 1;
  });
  initConnections();
  rebuildLines();
  clearHighlight();
  refreshUI(performance.now());
  scheduleUpdateLinePositions();
}

function rebuildFromSettings(){
  power = 0;
  gameStarted = false;
  running = false;
  finished = false;
  startTs = null;
  finishedElapsedMs = 0;
  clearHighlight();
  buildEngineModel();
  initConnections();
  buildUI();
  rebuildLines();
  refreshUI(performance.now());
  scheduleUpdateLinePositions();
}

function clampInt(raw, min, max, fallback){
  const value = Number(raw);
  if(!Number.isFinite(value)) return fallback;
  return Math.max(min, Math.min(max, Math.floor(value)));
}

function syncSettingsForm(){
  rowsInput.value = String(settings.rows);
  enginesInput.value = String(settings.enginesPerRow);
  timerInput.value = String(settings.timerMinutes);
}

function openSettings(){
  if(running) return;
  syncSettingsForm();
  settingsOverlay.classList.add("open");
}

function closeSettings(){ settingsOverlay.classList.remove("open"); }

settingsBtn.addEventListener("pointerdown", (ev) => { ev.preventDefault(); openSettings(); });
closeSettingsBtn.addEventListener("pointerdown", (ev) => { ev.preventDefault(); closeSettings(); });

resetSettingsBtn.addEventListener("pointerdown", (ev) => {
  ev.preventDefault();
  settings = { ...DEFAULT_SETTINGS };
  syncSettingsForm();
  rebuildFromSettings();
  closeSettings();
});

saveSettingsBtn.addEventListener("pointerdown", (ev) => {
  ev.preventDefault();
  settings = {
    rows: clampInt(rowsInput.value, 1, 8, DEFAULT_SETTINGS.rows),
    enginesPerRow: clampInt(enginesInput.value, 1, 10, DEFAULT_SETTINGS.enginesPerRow),
    timerMinutes: clampInt(timerInput.value, 1, 60, DEFAULT_SETTINGS.timerMinutes),
  };
  rebuildFromSettings();
  closeSettings();
});

settingsOverlay.addEventListener("pointerdown", (ev) => {
  if(ev.target === settingsOverlay) closeSettings();
});

startBtn.addEventListener("pointerdown", (ev) => {
  ev.preventDefault();
  if(!gameStarted){
    gameStarted = true;
    running = true;
    finished = false;
    startTs = performance.now();
    finishedElapsedMs = 0;
    refreshUI(startTs);
    scheduleUpdateLinePositions();
    return;
  }
  if(finished){
    resetGame();
    gameStarted = true;
    running = true;
    finished = false;
    startTs = performance.now();
    finishedElapsedMs = 0;
    refreshUI(startTs);
    scheduleUpdateLinePositions();
  }
});

window.addEventListener("resize", scheduleUpdateLinePositions);

let lastTs = performance.now();
let lastUiTs = 0;
function tick(ts){
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;

  if(running && !finished){
    const pps = totalPPS();
    if(pps > 0 && dt > 0) gain(pps * dt);
    checkTimeUp(ts);
  }

  if(ts - lastUiTs > 50){
    refreshUI(ts);
    lastUiTs = ts;
  } else {
    powerValueEl.textContent = formatInt(power);
    ppsValueEl.textContent = gameStarted ? formatInt(totalPPS()) : "0";
    timeValueEl.textContent = formatRemaining(getRemainingMs(ts));
  }

  requestAnimationFrame(tick);
}

buildEngineModel();
initConnections();
buildUI();
rebuildLines();
refreshUI(performance.now());
scheduleUpdateLinePositions();
requestAnimationFrame(tick);
</script>
</body>
</html>
